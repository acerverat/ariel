# Parametros del flujo de trabajo ARIEL.
# Referencia de parametros disponibles — los valores reales se generan con run.sh.
# Pasar a Nextflow con: -params-file /ruta/a/params.yaml

# Rutas de entrada
runSampleSheet: "/PATH/TO/sample_sheet.tsv"
referenceDir:   "/PATH/TO/GRCh38_no_alt"
tpmPanel:       "/PATH/TO/tpmPanel.tsv"

# Rutas de salida
resultsDir: "/PATH/TO/resultados"
reportsDir: "/PATH/TO/reportes"

# Hilos
threadsSTAR:    4
threadsRascall: 4
